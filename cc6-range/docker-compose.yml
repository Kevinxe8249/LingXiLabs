services:
  cc6-range:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: cc6-range
    ports:
      - "8080:8080"
    environment:
      # 签名密钥
      - app.sign.secret=Vuln_Range_CC6_S3cr3t_2025
      # 签名时间窗口（秒）
      - app.sign.timestampWindow=300
      # 登录凭据
      - app.auth.user=admin
      - app.auth.pass=Admin@123
      # AES 密钥
      - app.auth.aesKey=LingXi_S3cur3_K!
      - app.auth.aesIv=Lin9x1_1V_2025!!
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    networks:
      - cc6-network

networks:
  cc6-network:
    driver: bridge

